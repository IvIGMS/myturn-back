name: CI/CD - Build & Deploy (develop)

on:
  push:
    branches: ["develop"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute IMAGE_NAME (lowercase owner)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER_LC}/myturn-back-api" >> $GITHUB_ENV

      - name: Login to GHCR with GITHUB_TOKEN
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Temurin JDK 21 (to read pom version)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Read Maven project version
        run: echo "VERSION=$(mvn -q -DforceStdout -Dexpression=project.version help:evaluate)" >> $GITHUB_ENV

      - name: Build & push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest-develop
            ${{ env.IMAGE_NAME }}:develop-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${OWNER_LC}/myturn-back-api:latest-develop"

            echo "Pulling latest image..."
            docker pull $IMAGE

            cd ~/myturn-dev

            echo "Restarting API service..."
            docker compose -f docker-compose.dev.yml up -d api

            echo "Cleaning old images..."
            docker image prune -f
