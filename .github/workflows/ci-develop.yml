name: CI/CD - Build, Test & Deploy (develop)

on:
  push:
    branches: ["develop"]

permissions:
  contents: read
  packages: write

jobs:
  # 1️⃣ Lint: comprobar calidad/código
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run static code checks
        run: mvn -B spotless:check || echo "⚠️ No lint plugin yet, skipping"

  # 2️⃣ Tests: compilar + ejecutar tests
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run tests
        run: mvn -B clean verify

  # 3️⃣ Build: compilar la imagen (pero no subirla aún)
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute IMAGE_NAME
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER_LC}/myturn-back-api" >> $GITHUB_ENV

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: myturn-api:test

  # 4️⃣ Push: subir la imagen a GHCR
  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/myturn-back-api"
          VERSION=$(mvn -q -DforceStdout -Dexpression=project.version help:evaluate)

          docker tag myturn-api:test $IMAGE:latest-develop
          docker tag myturn-api:test $IMAGE:develop-${GITHUB_SHA}
          docker tag myturn-api:test $IMAGE:${VERSION}

          docker push $IMAGE:latest-develop
          docker push $IMAGE:develop-${GITHUB_SHA}
          docker push $IMAGE:${VERSION}

  # 5️⃣ Deploy: actualizar el VPS
  deploy:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${OWNER_LC}/myturn-back-api:latest-develop"

            echo "Pulling latest image..."
            docker pull $IMAGE

            cd ~/myturn-dev

            echo "Restarting API service..."
            docker compose -f docker-compose.dev.yml up -d api

            echo "Cleaning old images..."
            docker image prune -f
