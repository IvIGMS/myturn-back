version: '3.8'

services:
  db:
    image: postgres:16
    container_name: myturn-db
    environment:
      POSTGRES_DB: myturn
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5442:5432"
    volumes:
      - myturn_data:/var/lib/postgresql/data

volumes:
  myturn_data:
