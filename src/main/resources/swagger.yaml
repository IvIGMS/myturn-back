openapi: 3.0.2
info:
  title: MyTurnApp
  version: v1
tags:
  - name: auth
    description: Endpoints de autenticación
  - name: subscriptions
    description: Endpoints de gestión de suscripciones
  - name: companies
    description: Endpoints de gestión de empresas
security:
  - bearerAuth: []
paths:
  /users:
    get:
      summary: Obtiene todos los usuarios ligados a la empresa de la que es dueño el admin que consumen este endpoint
      operationId: getUsersByOwner
      responses:
        '200':
          $ref: '#/components/responses/ResponseListUserDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /users/get-self:
    get:
      summary: Get user-self
      operationId: getSelfUser
      responses:
        '200':
          $ref: '#/components/responses/ResponseUserDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /users/link-company/{linkedCodePathParam}:
    patch:
      summary: Vincular usuario con empresa
      operationId: linkUserToCompany
      parameters:
        - $ref: '#/components/parameters/linkedCodePathParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - users
  /login:
    post:
      summary: Login de un user
      operationId: login
      requestBody:
        $ref: '#/components/requestBodies/AuthenticationRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AuthenticationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - auth
  /register:
    post:
      summary: Register de un user
      operationId: register
      requestBody:
        $ref: '#/components/requestBodies/RegisterRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AuthenticationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - auth
  /subscriptions:
    post:
      summary: Crear nueva suscripción
      operationId: createSubscription
      requestBody:
        $ref: '#/components/requestBodies/CreateSubscriptionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - subscriptions
  /subscriptions/user/{userId}:
    get:
      summary: Obtener suscripciones de un usuario
      operationId: getSubscriptionsByUserId
      parameters:
        - $ref: '#/components/parameters/userIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/SubscriptionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - subscriptions
  /subscriptions/{subscriptionId}:
    get:
      summary: Obtener suscripción por ID
      operationId: getSubscriptionById
      parameters:
        - $ref: '#/components/parameters/subscriptionIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - subscriptions
  /companies:
    post:
      summary: Crear nueva empresa
      operationId: createCompany
      requestBody:
        $ref: '#/components/requestBodies/CreateCompanyRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/CompanyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - companies
  /companies/{companyId}:
    get:
      summary: Obtener empresa por ID
      operationId: getCompanyById
      parameters:
        - $ref: '#/components/parameters/companyIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/CompanyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - companies
  /companies/get-self:
    get:
      summary: Obtener empresa propia
      operationId: getSelfCompany
      responses:
        '200':
          $ref: '#/components/responses/CompanyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      tags:
        - companies
components:
  requestBodies:
    AuthenticationRequestBody:
      description: Login de un user
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticationRequestDTO'
          example:
            email: "usuario@ejemplo.com"
            password: "123456"
    RegisterRequestBody:
      description: Registrar un user
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequestDTO'
    CreateSubscriptionRequestBody:
      description: Crear nueva suscripción
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateSubscriptionRequestDTO'
          example:
            userId: 123
            startDate: "2024-01-01"
            durationInMonths: 12
    CreateCompanyRequestBody:
      description: Crear nueva empresa
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateCompanyRequestDTO'
          example:
            name: "Mi Empresa S.L."
            ownerId: 123

  parameters:
    pageNumberQueryParam:
      name: pageNumberQueryParam
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/pageNumberQueryParam'
    pageSizeQueryParam:
      name: pageSizeQueryParam
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/pageSizeQueryParam'
    nameQueryParam:
      name: nameQueryParam
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/nameQueryParam'
    sortByQueryParam:
      name: sortByQueryParam
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/sortByQueryParam'
    linkedCodePathParam:
      name: linkedCodePathParam
      in: path
      required: true
      schema:
        type: string
    ownerIdPathParam:
      name: ownerIdPathParam
      in: path
      required: true
      schema:
        type: integer
        format: int64
    userIdPathParam:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    subscriptionIdPathParam:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    companyIdPathParam:
      name: companyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    ListUsersResponse:
      description: OK.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UserDTO'
    AuthenticationResponse:
      description: OK.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticationDTO'
    ResponseListUserDTO:
      description: OK.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UserDTO'
    ResponseUserDTO:
      description: OK.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserDTO'
    SubscriptionResponse:
      description: OK.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SubscriptionDTO'
    SubscriptionListResponse:
      description: OK.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SubscriptionDTO'
    CompanyResponse:
      description: OK.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CompanyDTO'
    CompanyListResponse:
      description: OK.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CompanyDTO'
    PagedResponseUserDTO:
      description: OK.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedResponseUserDTO'
    NoContent:
      description: No Content
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Problem'
          example:
            '400':
              value:
                type: 'https://api.example.com/problems/validation-error'
                status: 400
                title: Validation Error
                detail: >-
                  One or more fields are invalid. See details for more information.
                instance: 'https://api.example.com/problems/validation-error/12345'
    Unauthorized:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Problem'
          example:
            '400':
              value:
                type: 'https://api.example.com/problems/validation-error'
                status: 401
                title: Validation Error
                detail: >-
                  One or more fields are invalid. See details for more information.
                instance: 'https://api.example.com/problems/validation-error/12345'
    Forbidden:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Problem'
          example:
            '400':
              value:
                type: 'https://api.example.com/problems/validation-error'
                status: 403
                title: Validation Error
                detail: >-
                  One or more fields are invalid. See details for more information.
                instance: 'https://api.example.com/problems/validation-error/12345'
    NotFound:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Problem'
          example:
            '400':
              value:
                type: 'https://api.example.com/problems/validation-error'
                status: 404
                title: Validation Error
                detail: >-
                  One or more fields are invalid. See details for more information.
                instance: 'https://api.example.com/problems/validation-error/12345'
    UnexpectedError:
      description: Bad Request
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Problem'
          example:
            '400':
              value:
                type: 'https://api.example.com/problems/validation-error'
                status: 404
                title: Validation Error
                detail: >-
                  One or more fields are invalid. See details for more information.
                instance: 'https://api.example.com/problems/validation-error/12345'
  schemas:
    PagedResponseUserDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserDTO'
        number:
          type: integer
          example: 1
        size:
          type: integer
          example: 25
        totalElements:
          type: integer
          format: int64
          example: 232
        totalPages:
          type: integer
          example: 23
    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        email:
          type: string
          example: user@user.com
        firstname:
          type: string
          example: Luis
        lastname:
          type: string
          example: Perez
        isEmailActive:
          type: boolean
          example: false

        role:
          type: string
          example: USER
    AuthenticationRequestDTO:
      type: object
      properties:
        email:
          type: string
          example: friasgilivan@gmail.com
        password:
          type: string
          example: 123456
    RegisterRequestDTO:
      type: object
      properties:
        email:
          type: string
          example: friasgilivan@gmail.com
        password:
          type: string
          example: 123456
        firstname:
          type: string
          example: 123456
        lastname:
          type: string
          example: 123456
        role:
          $ref: '#/components/schemas/Role'
    AuthenticationDTO:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.eyJmaXJzdG5hbW...
    Role:
      type: string
      enum:
        - USER
        - ADMIN
      description: Role de los users de la app
    Problem:
      type: object
      properties:
        error:
          type: string
    userId:
      title: example
      description: example
      type: integer
      format: int64
      minimum: 1
      maximum: 999999999999
      example: 1
    sortByQueryParam:
      type: string
      example: "productName"
    pageNumberQueryParam:
      title: example
      description: example
      type: integer
      minimum: 1
      maximum: 99999
      example: 1
    pageSizeQueryParam:
      title: example
      description: example
      type: integer
      minimum: 1
      maximum: 99999
      example: 1
    nameQueryParam:
      type: string
      example: "Joaquin"
    CreateSubscriptionRequestDTO:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 123
        startDate:
          type: string
          format: date
          example: "2024-01-01"
        durationInMonths:
          type: integer
          minimum: 1
          maximum: 120
          example: 12
      required:
        - userId
        - startDate
        - durationInMonths
    SubscriptionDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 123
        companyId:
          type: integer
          format: int64
          example: 123
        startDate:
          type: string
          format: date
          example: "2024-01-01"
        endDate:
          type: string
          format: date
          example: "2024-12-31"
      required:
        - id
        - userId
        - startDate
        - endDate
    CreateCompanyRequestDTO:
      type: object
      properties:
        name:
          type: string
          example: "Mi Empresa S.L."
      required:
        - name
    CompanyDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Mi Empresa S.L."
        ownerId:
          type: integer
          format: int64
          example: 123
        linkCode:
          type: string
          example: "eK408wX6pf"
      required:
        - id
        - name
        - ownerId

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT